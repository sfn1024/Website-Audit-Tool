services:
  - type: web
    name: website-audit-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Enter your Gemini API Key"
      - key: PORT
        value: 10000
